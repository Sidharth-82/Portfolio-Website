<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Llama 3.1-8B decoder-only transformer built from scratch: token pipeline and a transformer block with RMSNorm, grouped-query attention, and SwiGLU">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#15182e"/>
      <stop offset="1" stop-color="#1d1530"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="560" cy="250" rx="240" ry="200" fill="url(#glow)"/>

  <!-- header -->
  <text x="40" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff">Llama 3.1-8B — Built From Scratch</text>
  <text x="41" y="74" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#fcd34d">Decoder-only transformer · PyTorch</text>

  <!-- ============ LEFT: model pipeline ============ -->
  <rect x="40" y="92" width="232" height="372" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="60" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#94a3b8">FORWARD PASS</text>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
    <!-- pipeline connector -->
    <line x1="156" y1="140" x2="156" y2="430" stroke="#475569" stroke-width="2"/>

    <rect x="66" y="128" width="180" height="30" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="156" y="148">Token IDs</text>

    <rect x="66" y="172" width="180" height="30" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="156" y="192">Token Embeddings</text>

    <!-- highlighted block stack -->
    <rect x="74" y="222" width="180" height="48" rx="9" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-opacity="0.30"/>
    <rect x="70" y="218" width="180" height="48" rx="9" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-opacity="0.45"/>
    <rect x="66" y="214" width="180" height="48" rx="9" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-opacity="0.70"/>
    <text x="156" y="234" font-weight="700" fill="#fcd34d">Transformer Block</text>
    <text x="156" y="252" font-size="12" fill="#fde68a">× 32 layers</text>

    <rect x="66" y="286" width="180" height="30" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="156" y="306">Final RMSNorm</text>

    <rect x="66" y="330" width="180" height="30" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="156" y="350">Output Projection</text>

    <rect x="66" y="374" width="180" height="30" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="156" y="394">Logits → Sampling</text>

    <text x="156" y="430" font-size="12" fill="#94a3b8">temperature · top-p</text>
  </g>

  <!-- expand connector -->
  <g stroke="#f59e0b" stroke-opacity="0.6" stroke-width="1.6" fill="none" stroke-dasharray="4 4">
    <path d="M246 238 C 290 238, 300 250, 330 250"/>
  </g>

  <!-- ============ RIGHT: one block, expanded ============ -->
  <rect x="330" y="92" width="430" height="312" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="350" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#fcd34d">TRANSFORMER BLOCK · pre-norm + residual</text>

  <!-- vertical flow line -->
  <line x1="500" y1="132" x2="500" y2="384" stroke="#475569" stroke-width="2"/>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" text-anchor="middle">
    <!-- input -->
    <circle cx="500" cy="132" r="4" fill="#94a3b8"/>

    <!-- RMSNorm 1 -->
    <rect x="392" y="142" width="216" height="28" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="500" y="160" font-size="12.5" fill="#e2e8f0">RMSNorm</text>

    <!-- GQA -->
    <rect x="380" y="178" width="240" height="46" rx="10" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="500" y="198" font-size="13" font-weight="700" fill="#fde68a">Grouped-Query Attention</text>
    <text x="500" y="215" font-size="11" fill="#fcd34d">RoPE · KV cache · 32 Q / 8 KV heads</text>

    <!-- residual add 1 -->
    <circle cx="500" cy="240" r="11" fill="#15182e" stroke="#94a3b8"/>
    <text x="500" y="245" font-size="14" fill="#cbd5e1">+</text>

    <!-- RMSNorm 2 -->
    <rect x="392" y="262" width="216" height="28" rx="8" fill="#0e1424" stroke="#ffffff" stroke-opacity="0.14"/>
    <text x="500" y="280" font-size="12.5" fill="#e2e8f0">RMSNorm</text>

    <!-- SwiGLU -->
    <rect x="380" y="298" width="240" height="46" rx="10" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="500" y="318" font-size="13" font-weight="700" fill="#fde68a">SwiGLU FeedForward</text>
    <text x="500" y="335" font-size="11" fill="#fcd34d">W2( SiLU(W1·x) ⊙ W3·x ) · dim 14336</text>

    <!-- residual add 2 -->
    <circle cx="500" cy="360" r="11" fill="#15182e" stroke="#94a3b8"/>
    <text x="500" y="365" font-size="14" fill="#cbd5e1">+</text>

    <!-- output -->
    <circle cx="500" cy="384" r="4" fill="#94a3b8"/>
  </g>

  <!-- residual skip arcs (right side) -->
  <g stroke="#64748b" stroke-width="1.6" fill="none">
    <path d="M500 132 C 648 138, 648 234, 511 240"/>
    <path d="M500 252 C 648 260, 648 354, 511 360"/>
  </g>

  <!-- config chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="600" text-anchor="middle">
    <rect x="330" y="420" width="135" height="30" rx="15" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="397" y="439" fill="#fde68a">dim 4096 · 32 layers</text>

    <rect x="475" y="420" width="135" height="30" rx="15" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="542" y="439" fill="#cbd5e1">RoPE θ = 500000</text>

    <rect x="620" y="420" width="140" height="30" rx="15" fill="#0ea5e9" fill-opacity="0.14" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="690" y="439" fill="#bae6fd">~8.03B params loaded</text>
  </g>
</svg>
