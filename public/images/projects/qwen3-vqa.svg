<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Qwen 3 multimodal driving-scene VQA: surround cameras and LiDAR feeding a vision-language model that answers questions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e24"/>
      <stop offset="0.55" stop-color="#141038"/>
      <stop offset="1" stop-color="#1b1147"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <ellipse cx="255" cy="305" rx="220" ry="150" fill="url(#glow)"/>

  <!-- header -->
  <text x="40" y="50" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff">Qwen 3 — Driving Scene VQA</text>
  <text x="41" y="74" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" fill="#c4b5fd">Multimodal VLM · NuScenes · night split</text>

  <!-- ============ LEFT PANEL: sensors ============ -->
  <rect x="40" y="92" width="430" height="372" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="60" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#7dd3fc">SURROUND CAMERAS · LIDAR_TOP</text>

  <!-- 6 surround camera tiles -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600" fill="#cbd5e1" text-anchor="middle">
    <g>
      <rect x="60"  y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="89"  cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="89"  y="165">FRONT</text>
    </g>
    <g>
      <rect x="126" y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="155" cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="155" y="165">F-RIGHT</text>
    </g>
    <g>
      <rect x="192" y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="221" cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="221" y="165">B-RIGHT</text>
    </g>
    <g>
      <rect x="258" y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="287" cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="287" y="165">BACK</text>
    </g>
    <g>
      <rect x="324" y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="353" cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="353" y="165">B-LEFT</text>
    </g>
    <g>
      <rect x="390" y="130" width="58" height="40" rx="6" fill="#0e1c33" stroke="#38bdf8" stroke-opacity="0.5"/>
      <circle cx="419" cy="146" r="5" fill="#38bdf8" fill-opacity="0.5"/>
      <text x="419" y="165">F-LEFT</text>
    </g>
  </g>

  <!-- LiDAR top-down scan -->
  <g stroke="#38bdf8" fill="none">
    <ellipse cx="255" cy="320" rx="40"  ry="16"  stroke-opacity="0.30"/>
    <ellipse cx="255" cy="320" rx="80"  ry="32"  stroke-opacity="0.22"/>
    <ellipse cx="255" cy="320" rx="125" ry="50"  stroke-opacity="0.16"/>
    <ellipse cx="255" cy="320" rx="172" ry="69"  stroke-opacity="0.10"/>
  </g>
  <!-- sweep wedge -->
  <path d="M255 320 L120 268 A172 69 0 0 1 390 268 Z" fill="#38bdf8" fill-opacity="0.06"/>

  <!-- LiDAR returns -->
  <g fill="#7dd3fc">
    <circle cx="190" cy="300" r="2.2"/><circle cx="214" cy="290" r="2.2"/><circle cx="240" cy="285" r="2.2"/>
    <circle cx="270" cy="286" r="2.2"/><circle cx="298" cy="291" r="2.2"/><circle cx="322" cy="301" r="2.2"/>
    <circle cx="160" cy="316" r="2.2"/><circle cx="350" cy="318" r="2.2"/>
    <circle cx="200" cy="276" r="2"/><circle cx="232" cy="268" r="2"/><circle cx="278" cy="268" r="2"/><circle cx="312" cy="276" r="2"/>
    <circle cx="175" cy="338" r="2"/><circle cx="225" cy="350" r="2"/><circle cx="288" cy="350" r="2"/><circle cx="338" cy="340" r="2"/>
    <circle cx="150" cy="356" r="1.8"/><circle cx="362" cy="358" r="1.8"/><circle cx="255" cy="262" r="1.8"/>
    <circle cx="120" cy="332" r="1.6"/><circle cx="392" cy="334" r="1.6"/>
  </g>

  <!-- detected-object boxes -->
  <g stroke="#a78bfa" fill="#a78bfa" fill-opacity="0.10" stroke-width="1.4">
    <rect x="232" y="258" width="46" height="22" rx="3"/>
    <rect x="318" y="300" width="40" height="20" rx="3"/>
  </g>

  <!-- ego vehicle -->
  <g transform="translate(255 322)">
    <rect x="-12" y="-20" width="24" height="40" rx="5" fill="#f8fafc"/>
    <path d="M0 -30 L9 -18 L-9 -18 Z" fill="#a78bfa"/>
  </g>

  <!-- flow arrow to reasoning -->
  <g stroke="#a78bfa" stroke-width="2" fill="#a78bfa">
    <line x1="470" y1="278" x2="496" y2="278"/>
    <path d="M496 273 L506 278 L496 283 Z"/>
  </g>

  <!-- ============ RIGHT PANEL: reasoning ============ -->
  <rect x="506" y="92" width="254" height="372" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
  <text x="526" y="118" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="2" fill="#c4b5fd">VLM REASONING</text>

  <!-- question bubble -->
  <rect x="526" y="134" width="214" height="58" rx="12" fill="#0e1c33" stroke="#ffffff" stroke-opacity="0.10"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#e2e8f0">
    <text x="540" y="158"><tspan font-weight="700" fill="#7dd3fc">Q  </tspan>Is it safe to proceed</text>
    <text x="540" y="176">through the intersection?</text>
  </g>

  <!-- answer bubble -->
  <rect x="526" y="206" width="214" height="92" rx="12" fill="url(#accent)" fill-opacity="0.18" stroke="#a78bfa" stroke-opacity="0.55"/>
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" fill="#f5f3ff">
    <text x="540" y="230"><tspan font-weight="700" fill="#c4b5fd">A  </tspan>Yes — crossing is clear,</text>
    <text x="540" y="248">lead vehicle ~12 m ahead</text>
    <text x="540" y="266">in-lane, no pedestrians</text>
    <text x="540" y="284">detected. Proceed slowly.</text>
  </g>

  <!-- model chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600">
    <rect x="526" y="322" width="214" height="28" rx="14" fill="#7c3aed" fill-opacity="0.22" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="633" y="340" text-anchor="middle" fill="#ddd6fe">Qwen3-VL-8B · 4-bit NF4</text>
    <rect x="526" y="356" width="214" height="28" rx="14" fill="#0ea5e9" fill-opacity="0.16" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="633" y="374" text-anchor="middle" fill="#bae6fd">LoRA (q_proj, v_proj) · TRL SFT</text>
  </g>

  <!-- footer caption -->
  <text x="526" y="426" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">Parameter-efficient fine-tuning</text>
  <text x="526" y="444" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">on limited GPU compute</text>
</svg>
